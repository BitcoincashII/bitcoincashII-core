# These environment variables are set by the build process and read by
# test/*/test_runner.py and test/util/rpcauth-test.py

[environment]
PACKAGE_NAME=Bitcoin Cash II
PACKAGE_BUGREPORT=https://github.com/BitcoincashII
SRCDIR=/home/dev/bch2-dev/bch2-bc2-fork/build/..
BUILDDIR=/home/dev/bch2-dev/bch2-bc2-fork/build
EXEEXT=
RPCAUTH=/home/dev/bch2-dev/bch2-bc2-fork/build/../share/rpcauth/rpcauth.py

[components]
# Which components are enabled. These are commented out by `configure` if they were disabled when running config.
ENABLE_WALLET=true
USE_SQLITE=true
USE_BDB=true
ENABLE_CLI=true
ENABLE_BITCOINII_UTIL=true
ENABLE_WALLET_TOOL=true
ENABLE_BITCOINIID=true
ENABLE_FUZZ_BINARY=true
ENABLE_ZMQ=true
ENABLE_EXTERNAL_SIGNER=true
ENABLE_USDT_TRACEPOINTS=true
